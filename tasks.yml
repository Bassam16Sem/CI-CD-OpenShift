apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: project-tasks
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      # Cuplikan kode untuk tugas pembersihan
      image: alpine:latest
      script: |
        echo "Cleaning up workspace..."
        rm -rf $(workspaces.source.path)/*

    - name: nose-test
      # Cuplikan kode untuk tugas pengujian nose
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install nose
        nosetests -v
